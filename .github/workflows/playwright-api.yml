name: Playwright API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Playwright installation
        run: npx playwright --version

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-json-results
          path: test-results/results.json

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit-results
          path: test-results/junit.xml

      - name: Generate Test Execution Summary
        if: always()
        run: |
          node -e "
          const fs=require('fs');
          const r=require('./test-results/results.json');

          let total=0;
          let passed=0;
          let failed=0;

          function scan(s){
            if(s.specs){
              s.specs.forEach(x=>{
                total++;
                if(x.ok) passed++;
                else failed++;
              });
            }
            if(s.suites){
              s.suites.forEach(scan);
            }
          }

          scan(r);

          let summary=
          '## 🚀 Playwright API Test Summary\n\n' +
          '| Metric | Count |\n' +
          '|---|---|\n' +
          '| Total Tests | '+total+' |\n' +
          '| Passed | '+passed+' |\n' +
          '| Failed | '+failed+' |\n';

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          "  